name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . build twine

      - name: Validate country aliases
        run: python scripts/validate_country_aliases.py

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

  go-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run Go tests
        working-directory: cli
        run: go test ./...

  build-cli:
    runs-on: ubuntu-latest
    needs: go-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        working-directory: cli
        run: |
          mkdir -p dist build

          binary="serper"
          package="serper_${GOOS}_${GOARCH}.tar.gz"

          if [ "$GOOS" = "windows" ]; then
            binary="serper.exe"
            package="serper_${GOOS}_${GOARCH}.zip"
          fi

          go build -trimpath -ldflags="-s -w" -o "build/${binary}" .

          if [ "$GOOS" = "windows" ]; then
            (cd build && zip -q "../dist/${package}" "${binary}")
          else
            tar -C build -czf "dist/${package}" "${binary}"
          fi

          (cd dist && sha256sum "${package}" > "${package}.sha256")

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: serper-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/dist/*
          if-no-files-found: error

  release-cli:
    runs-on: ubuntu-latest
    needs: [build-cli]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: serper-*
          path: cli/dist
          merge-multiple: true

      - name: Generate checksum manifest
        working-directory: cli/dist
        run: |
          find . -maxdepth 1 -type f ! -name '*.sha256' ! -name 'SHA256SUMS' -printf '%f\n' \
            | sort \
            | xargs sha256sum > SHA256SUMS

      - name: Move Latest tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f Latest "$GITHUB_SHA"
          git push origin Latest --force

      - name: Ensure Latest release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view Latest >/dev/null 2>&1 || gh release create Latest --title "Latest" --notes "Latest CLI builds"

      - name: Upload CLI packages to Latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload Latest cli/dist/* --clobber
